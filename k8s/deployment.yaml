apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-toggle
  namespace: confuse
  labels:
    app: feature-toggle
    service: features
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feature-toggle
  template:
    metadata:
      labels:
        app: feature-toggle
        service: features
        version: v1.0.0
    spec:
      containers:
      - name: feature-toggle
        image: confuseimgr.azurecr.io/feature-toggle:v1.0.0
        ports:
        - containerPort: 3099
          name: http
        env:
        # Service Configuration
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: PORT
        - name: HOST
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: HOST
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: ENVIRONMENT
        
        # Database Configuration (from shared infrastructure)
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: shared-infrastructure
              key: postgres_host
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: shared-infrastructure
              key: postgres_port
        - name: POSTGRES_DATABASE
          valueFrom:
            configMapKeyRef:
              name: shared-infrastructure
              key: postgres_database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: shared-infrastructure-secrets
              key: postgres_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shared-infrastructure-secrets
              key: postgres_password
        - name: POSTGRES_SSL_MODE
          valueFrom:
            configMapKeyRef:
              name: shared-infrastructure
              key: postgres_ssl_mode
        
        # Redis Configuration (from shared infrastructure)
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: shared-infrastructure
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: shared-infrastructure
              key: redis_port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shared-infrastructure-secrets
              key: redis_password
        
        # CORS Configuration
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: CORS_ORIGINS
        
        # Feature Flag Configuration
        - name: DEFAULT_TTL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: DEFAULT_TTL_SECONDS
        - name: CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: CACHE_SIZE
        
        # Logging
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: feature-toggle-config
              key: LOG_LEVEL
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 3099
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 3099
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      imagePullSecrets:
      - name: acr-secret
      
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
