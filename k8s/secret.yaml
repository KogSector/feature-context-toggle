apiVersion: v1
kind: Secret
metadata:
  name: feature-toggle-secrets
  namespace: confuse
type: Opaque
stringData:
  # Service Secrets
  SERVICE_API_KEY: "feature_toggle_api_key_here"
  JWT_SECRET: "feature_toggle_jwt_secret_here"
  
  # Analytics Keys (if used)
  SEGMENT_WRITE_KEY: "segment_write_key_here"
  MIXPANEL_TOKEN: "mixpanel_token_here"
  
  # Encryption Keys
  ENCRYPTION_KEY: "32-byte-encryption-key-for-feature-toggle"
  
  # Database Secrets (if different from shared)
  # DATABASE_PASSWORD: "override_password_here"
